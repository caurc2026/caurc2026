<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAURC 2026 | Live Scoreboard</title>
    <link rel="icon" type="image/png" href="caulogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body class="bg-[#0f172a] text-white min-h-screen">

    <div class="flex flex-col min-h-screen">
        
        <div class="sticky top-0 z-[9999] bg-[#0f172a] border-b border-slate-800 shadow-2xl">
            <header class="p-4 lg:p-6 flex flex-col md:flex-row items-center justify-between container mx-auto">
                <div class="flex items-center gap-4">
                    <img src="caulogo.png" alt="CAU Logo" class="h-12 w-12 object-contain">
                    <div>
                        <h1 class="text-2xl md:text-3xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">CAURC 2026</h1>
                        <p class="text-slate-500 text-[10px] uppercase tracking-[0.3em]">Central Asian University Robotics</p>
                    </div>
                </div>
                <div id="connection-status" class="hidden md:block px-3 py-1 rounded-full border border-slate-800 bg-slate-950 text-[10px] font-bold tracking-widest text-cyan-500/50 uppercase">
                    System Active
                </div>
            </header>

            <nav class="border-t border-slate-800/50">
                <div class="container mx-auto flex justify-center">
                    <div class="group relative">
                        <button class="nav-main-btn">Line Following</button>
                        <div class="nav-dropdown">
                            <button onclick="changeView('Line Following', 1)" class="nav-sub-btn">Level 1: Beginner (52 Teams)</button>
                            <button onclick="changeView('Line Following', 2)" class="nav-sub-btn">Level 2: Intermediate (15 Teams)</button>
                            <button onclick="changeView('Line Following', 3)" class="nav-sub-btn">Level 3: Finals (Top 3)</button>
                        </div>
                    </div>
                    <div class="group relative">
                        <button class="nav-main-btn">Sumo Robot</button>
                        <div class="nav-dropdown">
                            <button onclick="changeView('Sumo', 1)" class="nav-sub-btn">Level 1: Beginner</button>
                            <button onclick="changeView('Sumo', 2)" class="nav-sub-btn">Level 2: Intermediate</button>
                            <button onclick="changeView('Sumo', 3)" class="nav-sub-btn">Level 3: Finals</button>
                        </div>
                    </div>
                </div>
            </nav>
        </div>

        <main class="flex-grow container mx-auto p-4 lg:p-10 relative z-10">
            <div id="view-title" class="text-center mb-10 pt-6">
                <h2 id="current-category" class="text-5xl md:text-7xl font-black uppercase tracking-tighter text-white">WELCOME</h2>
                <p id="current-level" class="text-cyan-400 font-bold tracking-[0.4em] uppercase text-sm mt-2">Select a Category Above</p>
            </div>

            <div id="scoreboard-output" class="max-w-6xl mx-auto">
                </div>
        </main>

        <footer class="p-8 border-t border-slate-800 text-[10px] text-slate-600 tracking-[0.3em] uppercase flex flex-col md:flex-row justify-between items-center">
            <div>&copy; 2026 Central Asian University</div>
            <div id="last-updated-tag" class="text-cyan-500/40">Sync: Waiting...</div>
            <div class="flex gap-4"><span>Robotics Tech Dept</span></div>
        </footer>
    </div>
</body>
</html>
